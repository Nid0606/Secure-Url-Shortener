<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL SHORTENER</title>
<style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        h2 {
            color: #333;
            margin-bottom: 5px;
        }
        input[type="text"] {
            width: 300px;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #0056b3;
        }
        .slider-container { margin: 15px 0; }
        #resultPanel {
            display: none;
            background: #eef9ff;
            border: 1px solid #bce1ff;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            text-align: center;
        }

        .dynamic-link {
            margin-top: 25px;
            font-size: 16px;
            color: #28a745;
            text-decoration: none;
            font-weight: bold;
            word-break: break-all;
        }
        .dynamic-link:hover {
            text-decoration: underline;
        }
        #shortLinkDisplay {
            word-break: break-all;
            font-weight: bold;
            color: #0066cc;
        }
        #copyBtn {
            background-color: #28a745;
            margin-top: 10px;
        }
        #copyBtn:hover { background-color: #218838; }
    </style>
    </head>

<body>
    <h2>Test URL Shorterner Connection</h2>
    <label for="longUrl">Enter Long URL:</label>
    <input type="text" id="longUrl" placeholder="Paste your long URL here..." value="https://github.com">
    
    <div class="slider-container">
        <label for="lengthSlider">Short Code Length: <span id="lengthVal">6</span></label>
        <input type="range" id="lengthSlider" min="4" max="12" value="6" style="width: 100%;">
    </div>

    <button id="sendBtn">Generate Short Link</button>

    <div id="resultPanel">
        <p>Your Shortened Link:</p>
        <p id="shortLinkDisplay"></p>
        <button id="copyBtn">Copy to Clipboard</button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
